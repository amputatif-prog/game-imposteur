<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VideoGame Imposteur</title>
    <style>
        /* --- CONFIGURATION GENERALE & BACKGROUND DEFILANT --- */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.5s ease;
        }

        body.menu-phase { background-color: #121212; }
        body.lobby-phase { background-color: #0f1c1e; } 
        body.game-phase { background-color: #1c0f0f; }  

        .bg-slider-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
            background-color: #0b0b0b;
        }

        .bg-track {
            display: flex;
            width: max-content;
            height: 100%;
            align-items: center;
            opacity: 0.15;
            filter: blur(2px) grayscale(30%);
            animation: scrollBackground 60s linear infinite;
        }

        body.lobby-phase .bg-track { filter: blur(4px) hue-rotate(90deg); opacity: 0.1; }
        body.game-phase .bg-track { filter: blur(1px) hue-rotate(0deg) saturate(1.5); opacity: 0.2; }

        .bg-track img {
            height: 100vh;
            object-fit: cover;
            user-select: none;
            pointer-events: none;
        }

        @keyframes scrollBackground {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(18,18,18,0.7) 0%, rgba(18,18,18,0.9) 100%);
            z-index: -1;
        }

        /* --- INTERFACE DU JEU --- */
        .container { 
            max-width: 600px; 
            width: 90%;
            margin: 20px auto; 
            background: rgba(20, 20, 20, 0.9);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #2d2d2d;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            box-sizing: border-box;
        }
        
        .container.large-game { max-width: 950px; }
        h1 { color: #ff4a4a; font-style: italic; margin-bottom: 5px; letter-spacing: 1px; }
        h2 { color: #f5f5dc; margin-top: 5px; }
        
        button {
            background-color: #f5f5dc;
            color: #121212;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            border-bottom: 4px solid #ff4a4a;
            border-radius: 4px;
            transition: transform 0.1s ease;
        }
        button:active { transform: translateY(2px); }
        button.quit { background-color: #ff4a4a; color: white; border-bottom: 4px solid #b31c1c; width: auto; margin-bottom: 20px; }
        button.sec { background-color: #333; color: white; border-bottom: 4px solid #555; }
        button.param-toggle { margin: 15px 0; }
        button:disabled { background-color: #555; color: #aaa; border-bottom-color: #333; cursor: not-allowed; }
        
        input[type="text"], select, input[type="number"] {
            padding: 12px;
            background: #1a1a1a;
            color: white;
            border: 1px solid #333;
            border-bottom: 2px solid #ff4a4a;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-size: 14px;
        }
        input[type="text"]:focus, select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #ff4a4a;
            background: #222;
        }
        
        .screen { display: none; }
        .active { display: block; }
        
        .box {
            background: #161616;
            border: 1px solid #2d2d2d;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            margin: 10px 0;
            text-align: left;
            border-radius: 6px;
        }
        .scroll-box { height: 140px; }
        
        /* --- STYLE DU PANNEAU DES PARAMÈTRES --- */
        .settings-zone {
            display: none; 
            background: #161616; 
            padding: 20px; 
            border: 1px solid #333; 
            margin-bottom: 20px; 
            border-radius: 8px; 
            text-align: left;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .settings-title {
            margin-top: 0; 
            color: #ff4a4a; 
            font-size: 14px; 
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid #2d2d2d; 
            padding-bottom: 8px;
            margin-bottom: 15px;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }
        .settings-group {
            display: flex;
            flex-direction: column;
        }
        .settings-group label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .settings-group input, .settings-group select {
            margin-bottom: 0;
        }
        .full-width-group {
            grid-column: 1 / -1;
            margin-top: 5px;
        }

        .chat-container { display: flex; gap: 5px; }
        .chat-input { flex-grow: 1; margin-bottom: 0 !important; }
        .chat-btn { width: auto; margin: 0; padding: 10px 15px; }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .code-box {
            background: #ff4a4a;
            color: #121212;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 2px;
            padding: 10px;
            border-radius: 4px;
            margin: 15px 0;
            display: inline-block;
        }

        .player-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #252525;
        }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #2ecc71; }
        .offline { background-color: #e74c3c; }

        .icon-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .icon-option { font-size: 24px; padding: 8px; background: #222; border: 2px solid transparent; border-radius: 4px; cursor: pointer; }
        .icon-option.selected { border-color: #ff4a4a; background: #333; }

        .game-layout { display: flex; flex-direction: row; gap: 20px; }
        .game-sidebar { flex: 1; display: flex; flex-direction: column; }
        .game-main { flex: 1.2; display: flex; flex-direction: column; }
        #game-chat { height: 320px; }

        @media (max-width: 768px) { .game-layout { flex-direction: column; } }
    </style>
</head>
<body class="menu-phase">

<div class="bg-slider-container">
    <div class="bg-track">
        <img src="amongus.jpg" alt="Among Us"><img src="cyber.jpg" alt="Cyberpunk"><img src="gta.jpg" alt="GTA"><img src="reddead.jpg" alt="Red Dead">
        <img src="amongus.jpg" alt="Among Us"><img src="cyber.jpg" alt="Cyberpunk"><img src="gta.jpg" alt="GTA"><img src="reddead.jpg" alt="Red Dead">
    </div>
    <div class="bg-overlay"></div>
</div>

<div class="container" id="main-container">

    <div id="menu-screen" class="screen active">
        <h1>GAME IMPOSTEUR</h1>
        <p style="color: #aaa; font-size: 14px; margin-bottom: 20px;">Édition Jeux Vidéo</p>
        
        <label for="pseudo-input" style="display:block; text-align:left; margin-bottom:5px; font-size:13px; color:#ccc;">Pseudo (Max 10 caract.) :</label>
        <input type="text" id="pseudo-input" placeholder="Ex: Player_One" maxlength="10">
        
        <div class="icon-selector" id="icon-picker">
            <div class="icon-option selected" onclick="selectIcon(this, '🐶')">🐶</div>
            <div class="icon-option" onclick="selectIcon(this, '🐔​​')">🐔​​</div>
            <div class="icon-option" onclick="selectIcon(this, '🐭​')">🐭​</div>
            <div class="icon-option" onclick="selectIcon(this, '🦊')">🦊</div>
            <div class="icon-option" onclick="selectIcon(this, '🐻')">🐻</div>
            <div class="icon-option" onclick="selectIcon(this, '🐼​')">🐼​</div>
            <div class="icon-option" onclick="selectIcon(this, '​​🐹​')">​🐹​​</div>
        </div>

        <button class="sec param-toggle" onclick="toggleSettingsDropdown()">⚙️ PARAMÈTRES DU JEU</button>
        
        <div id="settings-dropdown-zone" class="settings-zone">
            <div class="settings-title">Configuration de la partie</div>
            
            <div class="settings-grid">
                <div class="settings-group">
                    <label for="impo-count">Nombre d'Imposteurs</label>
                    <input type="number" id="impo-count" min="1" max="5" value="1">
                </div>

                <div class="settings-group">
                    <label for="word-difficulty">Difficulté des mots</label>
                    <select id="word-difficulty" onchange="renderWordList()">
                        <option value="all">Toutes les difficultés</option>
                        <option value="facile">Facile (Grand public)</option>
                        <option value="moyen">Moyen (Gamer standard)</option>
                        <option value="difficile">Difficile (Hardcore Gamer)</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label for="word-type">Catégorie</label>
                    <select id="word-type" onchange="renderWordList()">
                        <option value="all">Tout mélanger</option>
                        <option value="game">Noms de Jeux</option>
                        <option value="character">Personnages</option>
                        <option value="weapon">Armes & Équipements</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label>Visibilité du Rôle</label>
                    <select id="setting-role-visibility">
                        <option value="visible">Rôle + Mot (Standard)</option>
                        <option value="hide-role-definitively">Mot Uniquement (Masquer rôle)</option>
                    </select>
                </div>

                <div class="settings-group">
                    <label>Transparence du vote</label>
                    <select id="setting-vote-disclosure">
                        <option value="secret">Anonyme (X a voté !)</option>
                        <option value="detailed">Détaillé (X a voté contre Y)</option>
                    </select>
                </div>

                <div class="settings-group full-width-group">
                    <label>Mots actifs dans la sélection (<span id="active-count" style="color:#ff4a4a;">0</span>) :</label>
                    <div class="box scroll-box" id="dynamic-word-list" style="background:#111; height: 110px; margin-top:5px;"></div>
                </div>
            </div>
        </div>

        <button onclick="createGame()">CRÉER UNE PARTIE</button>
        <button class="sec" onclick="showScreen('join-screen')">REJOINDRE UNE PARTIE</button>
    </div>

    <div id="join-screen" class="screen">
        <button class="quit" onclick="showScreen('menu-screen')">✕ Retour</button>
        <h2>Rejoindre un Salon</h2>
        <input type="text" id="join-code-input" placeholder="CODE SECRET" style="text-transform: uppercase; text-align: center; font-size: 20px;">
        <button onclick="joinGame()">REJOINDRE LA PARTIE</button>
    </div>

    <div id="lobby-screen" class="screen">
        <h2>Salon de Jeu</h2>
        <div class="code-box" id="lobby-code-display">----</div>
        
        <div id="lobby-settings-recap" style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 4px; text-align: left; font-size: 13px; color: #ccc; margin-bottom: 15px;"></div>

        <h3>Joueurs connectés :</h3>
        <div class="box" id="player-list" style="height: 110px;"></div>

        <h3>Chat :</h3>
        <div class="box" id="lobby-chat" style="height: 100px;"></div>
        <div class="chat-container">
            <input type="text" class="chat-input" id="lobby-msg" placeholder="Message (Max 30 car.)" maxlength="30" onkeydown="checkEnter(event, 'lobby-chat', 'lobby-msg')">
            <button class="chat-btn" onclick="sendMsg('lobby-chat', 'lobby-msg')">Envoyer</button>
        </div>
        
        <br>
        <button id="start-game-btn" style="display:none;" onclick="startGame()">LANCER LA GAME ▶</button>
        <button class="quit" style="width: 100%; margin-top: 10px;" onclick="showScreen('menu-screen')">✕ Quitter</button>
    </div>

    <div id="game-screen" class="screen">
        <button class="quit" onclick="showScreen('menu-screen')">✕ Abandonner</button>
        <h2>Partie en cours !</h2>
        
        <div class="game-layout">
            <div class="game-sidebar">
                <h3>Chat de jeu :</h3>
                <div class="box" id="game-chat"></div>
                <div class="chat-container">
                    <input type="text" class="chat-input" id="game-msg" placeholder="Indices, débats... (Max 30 car.)" maxlength="30" onkeydown="checkEnter(event, 'game-chat', 'game-msg')">
                    <button class="chat-btn" onclick="sendMsg('game-chat', 'game-msg')">Envoyer</button>
                </div>
            </div>

            <div class="game-main">
                <div style="background: #1a1a1a; border: 2px dashed #ff4a4a; padding: 15px; margin-bottom: 15px; text-align: left;">
                    <h3 id="role-display-container" style="margin: 5px 0;">Rôle : <span id="role-display" style="color: #ff4a4a;">-</span></h3>
                    <h3 style="margin: 5px 0;">Ton Mot assigné : <span id="word-display" style="color: #f5f5dc; font-weight: bold; background: #222; padding: 2px 6px;">-</span></h3>
                </div>

                <h3>Statut des joueurs :</h3>
                <div class="box" id="game-player-status-list" style="height: 100px;"></div>

                <h3>Vote :</h3>
                <div style="background: #1a1a1a; padding: 15px; border: 1px solid #333; text-align: left;">
                    <select id="vote-select" class="vote-select"><option value="">-- Voter pour --</option></select>
                    <button id="vote-btn" onclick="submitVote()">VALIDER MON VOTE</button>
                </div>
            </div>
        </div>
    </div>

    <div id="end-screen" class="screen">
        <h1 id="end-title">-</h1>
        <p style="color: #aaa;">Tableau récapitulatif des rôles réels :</p>
        <div class="box" id="end-roles-list" style="height: auto; min-height: 100px;"></div>
        <button onclick="returnToLobby()" style="background-color: #2ecc71; border-bottom: 4px solid #27ae60; color: white; margin-top: 20px;">REVENIR AU SALON</button>
    </div>

</div>

    function toggleSettingsDropdown() {
        const zone = document.getElementById('settings-dropdown-zone');
        zone.style.display = zone.style.display === "none" ? "block" : "none";
    }

    function selectIcon(el, icon) {
        document.querySelectorAll('.icon-option').forEach(o => o.classList.remove('selected'));
        el.classList.add('selected');
        monIcone = icon;
    }

    function renderWordList() {
        const filtreType = document.getElementById('word-type').value;
        const filtreDiff = document.getElementById('word-difficulty').value;
        const container = document.getElementById('dynamic-word-list');
        container.innerHTML = "";

        dictionnaireMots.forEach(mot => {
            if ((filtreType === "all" || mot.type === filtreType) && (filtreDiff === "all" || mot.difficulte === filtreDiff)) {
                const div = document.createElement('div');
                div.className = "checkbox-item";
                div.innerHTML = `<input type="checkbox" id="mot-${mot.id}" ${mot.coche ? 'checked' : ''}>
                                 <label for="mot-${mot.id}" style="font-size:12px;">[${mot.type}] ${mot.nom}</label>`;
                div.querySelector('input').onclick = (e) => { mot.coche = e.target.checked; updateActiveCount(); };
                container.appendChild(div);
            }
        });
        updateActiveCount();
    }

    function updateActiveCount() {
        const filtreType = document.getElementById('word-type').value;
        const filtreDiff = document.getElementById('word-difficulty').value;
        const actifs = dictionnaireMots.filter(m => m.coche && (filtreType === "all" || m.type === filtreType) && (filtreDiff === "all" || m.difficulte === filtreDiff));
        document.getElementById('active-count').innerText = actifs.length;
    }

    renderWordList();

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const container = document.getElementById('main-container');
        container.className = screenId === 'game-screen' ? "container large-game" : "container";
        
        document.body.className = "";
        if(screenId === 'menu-screen' || screenId === 'join-screen') document.body.classList.add('menu-phase');
        if(screenId === 'lobby-screen') document.body.classList.add('lobby-phase');
        if(screenId === 'game-screen') document.body.classList.add('game-phase');

        document.getElementById(screenId).classList.add('active');
    }

    function createGame() {
        monPseudo = document.getElementById('pseudo-input').value.trim();
        const settings = {
            nbImposteurs: document.getElementById('impo-count').value,
            filtreType: document.getElementById('word-type').value,
            filtreDiff: document.getElementById('word-difficulty').value,
            roleVisibility: document.getElementById('setting-role-visibility').value,
            voteDisclosure: document.getElementById('setting-vote-disclosure').value
        };
        socket.emit('createGame', { pseudo: monPseudo, icone: monIcone, settings, dictionnaireMots });
    }

    function joinGame() {
        monPseudo = document.getElementById('pseudo-input').value.trim();
        const codeEntre = document.getElementById('join-code-input').value.trim().toUpperCase();
        if (!codeEntre) return alert("Code requis !");
        socket.emit('joinGame', { code: codeEntre, pseudo: monPseudo, icone: monIcone });
    }

    function checkEnter(event, chatId, inputId) { if (event.key === "Enter") { event.preventDefault(); sendMsg(chatId, inputId); } }
    function sendMsg(chatId, inputId) {
        let input = document.getElementById(inputId);
        if(input.value.trim()) {
            socket.emit('sendMessage', { code: gameCodeActuel, pseudo: `${monIcone} ${monPseudo}`, msg: input.value, targetChat: chatId });
            input.value = "";
        }
    }

    function startGame() { socket.emit('startGame', { code: gameCodeActuel }); }
    function submitVote() {
        const cible = document.getElementById('vote-select').value;
        if(!cible) return alert("Choisis une cible !");
        document.getElementById('vote-btn').disabled = true;
        socket.emit('castVote', { code: gameCodeActuel, duJoueur: monPseudo, contre: cible });
    }
    function returnToLobby() { socket.emit('requestLobbyReturn', gameCodeActuel); }

    /* --- EVENTS SOCKET --- */
    socket.on('gameCreated', (data) => {
        gameCodeActuel = data.code; monPseudo = data.assignedPseudo;
        document.getElementById('pseudo-input').value = monPseudo;
        document.getElementById('lobby-code-display').innerText = gameCodeActuel;
        document.getElementById('start-game-btn').style.display = "block";
        buildSettingsRecap(data.settings);
        updatePlayerListUI(data.players);
        showScreen('lobby-screen');
    });

    socket.on('gameJoined', (data) => {
        gameCodeActuel = data.code; monPseudo = data.assignedPseudo;
        document.getElementById('pseudo-input').value = monPseudo;
        document.getElementById('lobby-code-display').innerText = gameCodeActuel;
        document.getElementById('start-game-btn').style.display = "none";
        buildSettingsRecap(data.settings);
        updatePlayerListUI(data.players);
        showScreen('lobby-screen');
    });

    socket.on('updatePlayers', (data) => {
        document.getElementById('start-game-btn').style.display = socket.id === data.hostId ? "block" : "none";
        updatePlayerListUI(data.players);
    });

    socket.on('receiveMessage', (data) => {
        let chat = document.getElementById(data.targetChat);
        if (chat) { chat.innerHTML += `<div><b>${data.pseudo}:</b> ${data.msg}</div>`; chat.scrollTop = chat.scrollHeight; }
    });

    socket.on('gameStarted', (data) => {
        showScreen('game-screen');
        document.getElementById('vote-btn').disabled = false;
        document.getElementById('word-display').innerText = data.word;

        if (data.roleVisibility === "hide-role-definitively") {
            document.getElementById('role-display-container').style.display = "none";
        } else {
            document.getElementById('role-display-container').style.display = "block";
            document.getElementById('role-display').innerText = data.role;
        }

        document.getElementById('game-chat').innerHTML = `<div style="color:#aaa; font-style:italic;">Système: La partie commence ! Devinez qui a un mot différent !</div><br>`;
    });

    socket.on('gameOver', (data) => {
        showScreen('end-screen');
        document.getElementById('end-title').innerText = data.winnerText;
        let html = "";
        data.allRoles.forEach(p => {
            let color = p.role === "Imposteur" ? "#ff4a4a" : "#2ecc71";
            html += `<div>• ${p.icone} <b>${p.pseudo}</b> : <span style="color:${color}">${p.role}</span> (Mot : <b>${p.word}</b>)</div>`;
        });
        document.getElementById('end-roles-list').innerHTML = html;
    });

    socket.on('backToLobby', (data) => {
        document.getElementById('start-game-btn').style.display = socket.id === data.hostId ? "block" : "none";
        updatePlayerListUI(data.players);
        showScreen('lobby-screen');
    });

    function buildSettingsRecap(s) {
        if(!s) return;
        let vis = s.roleVisibility === "hide-role-definitively" ? "🔴 Rôle caché" : "🟢 Rôles visibles";
        document.getElementById('lobby-settings-recap').innerHTML = `
            <b>Configuration de la partie :</b><br>
            • Imposteur(s) : ${s.nbImposteurs} | Difficulté : ${s.filtreDiff}<br>
            • Catégorie : ${s.filtreType} | Visibilité : ${vis} | Suivi Votes : ${s.voteDisclosure}
        `;
    }

    function updatePlayerListUI(players) {
        let listHTML = "";
        players.forEach(p => { listHTML += `• ${p.icone} ${p.pseudo} ${p.id === socket.id ? '(Toi)':''}<br>`; });
        document.getElementById('player-list').innerHTML = listHTML;

        let statusHTML = "";
        players.forEach(p => {
            let online = p.connected !== false;
            statusHTML += `<div class="player-status"><span>${p.icone} ${p.pseudo}</span><span style="font-size:12px;"><span class="status-dot ${online?'online':'offline'}"></span> ${online?'En jeu':'Déco'}</span></div>`;
        });
        document.getElementById('game-player-status-list').innerHTML = statusHTML;

        const select = document.getElementById('vote-select');
        let current = select.value;
        select.innerHTML = '<option value="">-- Voter pour --</option>';
        players.forEach(p => {
            let opt = document.createElement('option'); opt.value = p.pseudo; opt.innerText = `${p.icone} ${p.pseudo}`; select.appendChild(opt);
        });
        select.value = current;
    }
</script>
